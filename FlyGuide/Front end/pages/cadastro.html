<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FlyGuide — Criar conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link href="../assets/css/pages/auth.css" rel="stylesheet" />
</head>

<body data-pagina="cadastro" style="font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-topbar"></div>

      <div class="auth-inner">
        <a class="auth-back" href="login.html">
          <i class="bi bi-arrow-left"></i> Voltar para entrar
        </a>

        <h1 class="auth-title">Criar sua conta</h1>
        <div class="auth-subtitle">Preencha seus dados para continuar</div>

        <form id="formularioCadastro" novalidate>
          <div class="auth-field mb-3">
            <label for="emailCadastro">E-mail</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input id="emailCadastro" type="email" class="form-control" placeholder="voce@exemplo.com" autocomplete="email" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="cpfCadastro">CPF</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
              <input id="cpfCadastro" type="text" class="form-control" placeholder="000.000.000-00" inputmode="numeric" autocomplete="off" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="cepCadastro">CEP</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
              <input id="cepCadastro" type="text" class="form-control" placeholder="00000-000" inputmode="numeric" autocomplete="postal-code" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="senhaCadastro">Senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input id="senhaCadastro" type="password" class="form-control" placeholder="Mín. 8 caracteres" autocomplete="new-password" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="confirmarSenhaCadastro">Confirmar senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
              <input id="confirmarSenhaCadastro" type="password" class="form-control" placeholder="Repita a senha" autocomplete="new-password" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <button class="btn btn-primary auth-btn auth-btn-primary w-100" type="submit">
            Criar conta
          </button>

          <div class="alert auth-alert mt-3" data-alerta-auth role="alert"></div>

          <div class="auth-footer">
            <span></span>
            <a href="login.html">Já tem conta? <span style="color:#0f172a;">Entrar</span></a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="/assets/js/auth.js"></script>
</body>
</html>
