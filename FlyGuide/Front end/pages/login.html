<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <title>FlyGuide — Entrar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <link href="../assets/css/pages/auth.css" rel="stylesheet" />
</head>

<body data-pagina="login" style="font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-topbar"></div>

      <div class="auth-inner">
        <div class="auth-logo">
          <i class="bi bi-compass" style="font-size:1.35rem; color:#0f172a;"></i>
        </div>

        <h1 class="auth-title">Bem-vindo ao FlyGuide</h1>
        <div class="auth-subtitle">Entre para continuar</div>

        <div class="auth-divider">OU</div>

        <form id="formularioLogin" novalidate>
          <div class="auth-field mb-3">
            <label for="emailLogin">E-mail</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input id="emailLogin" type="email" class="form-control" placeholder="voce@exemplo.com" autocomplete="email" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="senhaLogin">Senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input id="senhaLogin" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <button class="btn btn-primary auth-btn auth-btn-primary w-100" type="submit">
            Entrar
          </button>

          <div class="alert auth-alert mt-3" data-alerta-auth role="alert"></div>

          <div class="auth-footer">
            <a href="#" id="linkEsqueceuSenha">Esqueceu a senha?</a>
            <a href="cadastro.html">Não tem conta? <span style="color:#0f172a;">Criar</span></a>
          </div>
        </form>

        <!-- ── ETAPA 1: Informe o e-mail ──────────────────────────── -->
        <div id="telaEsqueceuEmail" style="display:none;">
          <div class="mb-4">
            <h2 class="auth-title" style="font-size:1.2rem;">Recuperar senha</h2>
            <div class="auth-subtitle">Informe seu e-mail e enviaremos um código.</div>
          </div>
          <div class="auth-field mb-3">
            <label for="emailRecuperar">E-mail</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input id="emailRecuperar" type="email" class="form-control" placeholder="voce@exemplo.com" autocomplete="email">
            </div>
            <div class="invalid-feedback"></div>
          </div>
          <button id="btnSolicitarOtp" class="btn btn-primary auth-btn auth-btn-primary w-100" type="button">
            Enviar código
          </button>
          <div class="alert auth-alert mt-3" id="alertaRecuperar" role="alert"></div>
          <div class="auth-footer">
            <a href="#" id="linkVoltarLogin">← Voltar ao login</a>
          </div>
        </div>

        <!-- ── ETAPA 2: Código OTP + nova senha ───────────────────── -->
        <div id="telaResetSenha" style="display:none;">
          <div class="mb-4">
            <h2 class="auth-title" style="font-size:1.2rem;">Redefinir senha</h2>
            <div class="auth-subtitle" id="subtituloReset">Digite o código que enviamos e escolha uma nova senha.</div>
          </div>
          <div class="auth-field mb-3">
            <label for="codigoReset">Código</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
              <input id="codigoReset" type="text" class="form-control" placeholder="000000" maxlength="6" inputmode="numeric">
            </div>
            <div class="invalid-feedback"></div>
          </div>
          <div class="auth-field mb-3">
            <label for="novaSenha">Nova senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input id="novaSenha" type="password" class="form-control" placeholder="Mínimo 8 caracteres">
            </div>
            <div class="invalid-feedback"></div>
          </div>
          <div class="auth-field mb-3">
            <label for="confirmarNovaSenha">Confirmar nova senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
              <input id="confirmarNovaSenha" type="password" class="form-control" placeholder="Repita a nova senha">
            </div>
            <div class="invalid-feedback"></div>
          </div>
          <button id="btnResetarSenha" class="btn btn-primary auth-btn auth-btn-primary w-100" type="button">
            Redefinir senha
          </button>
          <div class="alert auth-alert mt-3" id="alertaReset" role="alert"></div>
          <div class="auth-footer">
            <a href="#" id="linkVoltarEmail">← Voltar</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="../assets/js/auth.js"></script>
</body>
</html>
