<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>FlyGuide — Criar conta</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="../assets/css/pages/auth.css" rel="stylesheet" />

  <style>
    .tipo-toggle { display: flex; gap: 8px; margin-bottom: 20px; }
    .tipo-btn {
      flex: 1; height: 44px; border-radius: 12px; border: 2px solid #e2e8f0;
      background: #fff; font-weight: 700; color: #64748b; cursor: pointer;
      transition: all .15s;
    }
    .tipo-btn.ativo { border-color: #0f172a; background: #0f172a; color: #fff; }
    .cep-spinner {
      display: none;
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    }
    .input-group { position: relative; }
  </style>
</head>

<body data-pagina="cadastro" style="font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;">
  <main class="auth-page">
    <div class="auth-card">
      <div class="auth-topbar"></div>

      <div class="auth-inner">
        <a class="auth-back" href="login.html">
          <i class="bi bi-arrow-left"></i> Voltar para entrar
        </a>

        <h1 class="auth-title">Criar sua conta</h1>
        <div class="auth-subtitle">Preencha seus dados para continuar</div>

        <form id="formularioCadastro" novalidate>

          <!-- Seletor PF / PJ -->
          <div class="tipo-toggle">
            <button type="button" class="tipo-btn ativo" id="btnPF">
              <i class="bi bi-person me-1"></i> Pessoa Física
            </button>
            <button type="button" class="tipo-btn" id="btnPJ">
              <i class="bi bi-building me-1"></i> Pessoa Jurídica
            </button>
          </div>

          <!-- ===== CAMPOS PF ===== -->
          <div id="camposPF">
            <div class="row g-2 mb-3">
              <div class="col-6">
                <div class="auth-field">
                  <label for="primeiroNomeCadastro">Primeiro nome</label>
                  <div class="input-group auth-input">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input id="primeiroNomeCadastro" type="text" class="form-control" placeholder="João" autocomplete="given-name">
                  </div>
                  <div class="invalid-feedback"></div>
                </div>
              </div>
              <div class="col-6">
                <div class="auth-field">
                  <label for="ultimoNomeCadastro">Sobrenome</label>
                  <div class="input-group auth-input">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input id="ultimoNomeCadastro" type="text" class="form-control" placeholder="Silva" autocomplete="family-name">
                  </div>
                  <div class="invalid-feedback"></div>
                </div>
              </div>
            </div>

            <div class="auth-field mb-3">
              <label for="cpfCadastro">CPF</label>
              <div class="input-group auth-input">
                <span class="input-group-text"><i class="bi bi-person-vcard"></i></span>
                <input id="cpfCadastro" type="text" class="form-control" placeholder="000.000.000-00" inputmode="numeric" autocomplete="off">
              </div>
              <div class="invalid-feedback"></div>
            </div>
          </div>

          <!-- ===== CAMPOS PJ ===== -->
          <div id="camposPJ" style="display:none;">
            <div class="auth-field mb-3">
              <label for="razaoSocialCadastro">Razão Social</label>
              <div class="input-group auth-input">
                <span class="input-group-text"><i class="bi bi-building"></i></span>
                <input id="razaoSocialCadastro" type="text" class="form-control" placeholder="Empresa Ltda">
              </div>
              <div class="invalid-feedback"></div>
            </div>

            <div class="auth-field mb-3">
              <label for="nomeFantasiaCadastro">Nome Fantasia <span class="text-secondary fw-normal">(opcional)</span></label>
              <div class="input-group auth-input">
                <span class="input-group-text"><i class="bi bi-tag"></i></span>
                <input id="nomeFantasiaCadastro" type="text" class="form-control" placeholder="Nome comercial">
              </div>
              <div class="invalid-feedback"></div>
            </div>

            <div class="auth-field mb-3">
              <label for="cnpjCadastro">CNPJ</label>
              <div class="input-group auth-input">
                <span class="input-group-text"><i class="bi bi-upc"></i></span>
                <input id="cnpjCadastro" type="text" class="form-control" placeholder="00.000.000/0000-00" inputmode="numeric" autocomplete="off">
              </div>
              <div class="invalid-feedback"></div>
            </div>

            <div class="auth-field mb-3">
              <label for="ieCadastro">Inscrição Estadual <span class="text-secondary fw-normal">(opcional)</span></label>
              <div class="input-group auth-input">
                <span class="input-group-text"><i class="bi bi-file-text"></i></span>
                <input id="ieCadastro" type="text" class="form-control" placeholder="Inscrição estadual" inputmode="numeric" autocomplete="off">
              </div>
              <div class="invalid-feedback"></div>
            </div>
          </div>

          <!-- ===== CAMPOS COMUNS ===== -->
          <div class="auth-field mb-3">
            <label for="emailCadastro">E-mail</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-envelope"></i></span>
              <input id="emailCadastro" type="email" class="form-control" placeholder="voce@exemplo.com" autocomplete="email" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <!-- CEP com preenchimento automático -->
          <div class="auth-field mb-3">
            <label for="cepCadastro">CEP</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-geo-alt"></i></span>
              <input id="cepCadastro" type="text" class="form-control" placeholder="00000-000" inputmode="numeric" autocomplete="postal-code" required>
              <span class="input-group-text" id="cepSpinner" style="display:none;">
                <span class="spinner-border spinner-border-sm text-secondary"></span>
              </span>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <!-- Endereço (preenchido automaticamente pelo ViaCEP) -->
          <div class="auth-field mb-3">
            <label for="enderecoCadastro">Endereço</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-house"></i></span>
              <input id="enderecoCadastro" type="text" class="form-control" placeholder="Preenchido automaticamente pelo CEP" readonly>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <!-- Cidade e País lado a lado -->
          <div class="row g-2 mb-3">
            <div class="col-7">
              <div class="auth-field">
                <label for="cidadeCadastro">Cidade</label>
                <div class="input-group auth-input">
                  <span class="input-group-text"><i class="bi bi-building"></i></span>
                  <input id="cidadeCadastro" type="text" class="form-control" placeholder="Preenchido pelo CEP" readonly>
                </div>
                <div class="invalid-feedback"></div>
              </div>
            </div>
            <div class="col-5">
              <div class="auth-field">
                <label for="paisCadastro">País</label>
                <div class="input-group auth-input">
                  <span class="input-group-text"><i class="bi bi-globe"></i></span>
                  <input id="paisCadastro" type="text" class="form-control" value="Brasil" readonly>
                </div>
                <div class="invalid-feedback"></div>
              </div>
            </div>
          </div>

          <div class="auth-field mb-3">
            <label for="senhaCadastro">Senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-lock"></i></span>
              <input id="senhaCadastro" type="password" class="form-control" placeholder="Mín. 8 caracteres" autocomplete="new-password" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <div class="auth-field mb-3">
            <label for="confirmarSenhaCadastro">Confirmar senha</label>
            <div class="input-group auth-input">
              <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
              <input id="confirmarSenhaCadastro" type="password" class="form-control" placeholder="Repita a senha" autocomplete="new-password" required>
            </div>
            <div class="invalid-feedback"></div>
          </div>

          <button class="btn btn-primary auth-btn auth-btn-primary w-100" type="submit">
            Criar conta
          </button>

          <div class="alert auth-alert mt-3" data-alerta-auth role="alert"></div>

          <div class="auth-footer">
            <span></span>
            <a href="login.html">Já tem conta? <span style="color:#0f172a;">Entrar</span></a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <script src="../assets/js/auth.js"></script>
</body>
</html>
